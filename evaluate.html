<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Evaluation — Mohammad Shahabuddin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 440px;
            width: 100%;
            padding: 36px 28px;
            border-radius: 16px;
            box-shadow: 0 4px 28px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 1.4rem; color: #2d3436; margin-bottom: 4px; }
        h2 { font-size: 0.95rem; color: #0984e3; font-weight: 500; margin-bottom: 18px; }
        .prompt-preview {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 14px;
            text-align: left;
            font-size: 0.8rem;
            color: #636e72;
            margin-bottom: 20px;
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-word;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            text-decoration: none;
            color: white;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-chatgpt { background: #10a37f; }
        .btn-gemini { background: #4285f4; }
        .btn-deepseek { background: #4d6bfe; }
        .hint {
            font-size: 0.72rem;
            color: #b2bec3;
            margin-top: 16px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📋 Evaluate This CV</h1>
        <h2>Mohammad Shahabuddin</h2>

        <div class="prompt-preview" id="prompt-text"></div>

        <button class="btn btn-chatgpt" onclick="openAI('chatgpt')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Open in ChatGPT
        </button>

        <button class="btn btn-gemini" onclick="openAI('gemini')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
            Open in Gemini
        </button>

        <button class="btn btn-deepseek" onclick="openAI('deepseek')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            Open in DeepSeek
        </button>

        <p class="hint">If the prompt doesn't appear automatically, paste from clipboard (Ctrl+V / tap Paste).</p>
    </div>

    <script>
        const CV_URL = 'https://sahabx.github.io/cv/cv-content.html';
        const PROMPT = `Please act as a professional recruiter and career coach. Evaluate the CV at this URL thoroughly: ${CV_URL}\n\nProvide a structured assessment covering:\n1. Overall impression and professional positioning\n2. Strengths \u2014 what stands out, key achievements, unique value\n3. Areas for improvement \u2014 gaps, presentation issues, missing elements\n4. Role fit \u2014 what types of roles and seniority levels this CV is best suited for\n5. Specific recommendations to make the CV more competitive\n\nBe honest, constructive, and detailed.`;

        document.getElementById('prompt-text').textContent = PROMPT;

        async function openAI(platform) {
            // Always copy to clipboard as fallback
            try { await navigator.clipboard.writeText(PROMPT); } catch(e) {}

            const encoded = encodeURIComponent(PROMPT);

            const urls = {
                // ChatGPT web supports ?q= for pre-filling the input
                chatgpt: `https://chatgpt.com/?q=${encoded}`,
                // Gemini - open main page; prompt copied to clipboard
                gemini: `https://gemini.google.com/app`,
                // DeepSeek supports ?q= for pre-filling
                deepseek: `https://chat.deepseek.com/?q=${encoded}`
            };

            window.open(urls[platform], '_blank');
        }
    </script>
</body>
</html>
